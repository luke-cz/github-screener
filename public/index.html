<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Screener — Talent Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #22222e;
    --border-bright: #33334a;
    --text: #e8e8f0;
    --text-muted: #6b6b88;
    --text-dim: #3a3a50;
    --accent: #7c6af7;
    --accent-dim: #2a2458;
    --accent-glow: rgba(124, 106, 247, 0.15);
    --green: #3ddc84;
    --green-dim: #1a3d2b;
    --yellow: #f5c842;
    --yellow-dim: #3d3010;
    --red: #f05c5c;
    --red-dim: #3d1515;
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Instrument Serif', serif;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 60px 24px 100px;
  }

  header {
    margin-bottom: 56px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  h1 {
    font-family: var(--serif);
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 400;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 12px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .tagline {
    color: var(--text-muted);
    font-size: 14px;
    font-family: var(--mono);
    letter-spacing: 0.03em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 16px;
  }

  .card-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 0;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 13px 18px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.03em;
  }

  input[type="text"]::placeholder { color: var(--text-dim); }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .domain-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
    margin-bottom: 0;
  }

  .domain-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .domain-btn:hover {
    border-color: var(--border-bright);
    color: var(--text);
  }

  .domain-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .domain-icon { font-size: 14px; }

  .run-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 16px;
  }

  .run-btn:hover { background: #9080ff; box-shadow: 0 4px 20px rgba(124,106,247,0.4); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

  .status {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 14px;
    min-height: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status.error { color: var(--red); }

  .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border-bright);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #results { display: none; margin-top: 32px; }
  #results.visible { display: block; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .profile-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid var(--border-bright);
  }
  .profile-info .name {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
  }
  .profile-info .handle {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .verdict {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .verdict.hire    { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .verdict.maybe   { background: var(--yellow-dim); color: var(--yellow); border: 1px solid var(--yellow); }
  .verdict.pass    { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
  .verdict::before { content: '●'; font-size: 8px; }

  .score-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 24px;
  }
  .score-number {
    font-family: var(--serif);
    font-size: 64px;
    font-weight: 400;
    line-height: 1;
    color: var(--accent);
  }
  .score-denom {
    font-family: var(--mono);
    font-size: 16px;
    color: var(--text-dim);
  }
  .score-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-left: 4px;
    align-self: center;
  }

  .dims { margin-bottom: 24px; }
  .dim-row {
    display: grid;
    grid-template-columns: 150px 1fr 36px;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .dim-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .bar-track {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    width: 0%;
  }
  .dim-val {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
  }

  .signals { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
  .signal {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
  }
  .signal.green  { background: var(--green-dim);  color: var(--green); }
  .signal.yellow { background: var(--yellow-dim); color: var(--yellow); }
  .signal.red    { background: var(--red-dim);    color: var(--red); }
  .signal-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .summary-text {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
  }
  .summary-text p + p { margin-top: 12px; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .saved-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .saved-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .saved-search {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 6px;
    min-width: 180px;
  }

  .saved-search::placeholder { color: var(--text-dim); }

  .saved-list {
    display: grid;
    gap: 10px;
  }

  .saved-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }

  .saved-item:hover {
    border-color: var(--border-bright);
    transform: translateY(-1px);
  }

  .saved-meta {
    display: grid;
    gap: 2px;
  }

  .saved-title {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
  }

  .saved-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  .saved-score {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
  }

  .saved-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ghost-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
  }
  .ghost-btn:hover { color: var(--text); border-color: var(--border-bright); }

  footer {
    margin-top: 80px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">GitHub Screener</div>
    <h1>Talent <em>intelligence</em><br>for technical hiring.</h1>
    <p class="tagline">// AI-powered analysis of GitHub profiles</p>
  </header>

  <div class="card">
    <div class="card-label">GitHub Profile</div>
    <div class="input-row">
      <input type="text" id="handleInput" placeholder="username or github.com/username" />
    </div>
  </div>

  <div class="card">
    <div class="card-label">Skill Domain</div>
    <div class="domain-grid" id="domainGrid">
      <button class="domain-btn active" data-domain="Backend" onclick="selectDomain(this)"><span class="domain-icon">⚙️</span> Backend</button>
      <button class="domain-btn" data-domain="Frontend" onclick="selectDomain(this)"><span class="domain-icon">🎨</span> Frontend</button>
      <button class="domain-btn" data-domain="Smart Contracts" onclick="selectDomain(this)"><span class="domain-icon">🔗</span> Smart Contracts</button>
      <button class="domain-btn" data-domain="ML / AI" onclick="selectDomain(this)"><span class="domain-icon">🧠</span> ML / AI</button>
      <button class="domain-btn" data-domain="DevOps" onclick="selectDomain(this)"><span class="domain-icon">🚀</span> DevOps</button>
      <button class="domain-btn" data-domain="Data Engineering" onclick="selectDomain(this)"><span class="domain-icon">📊</span> Data</button>
      <button class="domain-btn" data-domain="Mobile" onclick="selectDomain(this)"><span class="domain-icon">📱</span> Mobile</button>
      <button class="domain-btn" data-domain="Security" onclick="selectDomain(this)"><span class="domain-icon">🔐</span> Security</button>
    </div>

    <button class="run-btn" id="runBtn" onclick="runScreening()">Run Screening →</button>
    <div class="status" id="status"></div>
  </div>

  <div class="card" id="savedCard">
    <div class="saved-wrap">
      <div class="card-label" style="margin-bottom:0;">Saved Assessments</div>
      <div class="saved-controls">
        <input class="saved-search" id="savedSearch" placeholder="Search saved..." />
        <button class="ghost-btn" id="exportSavedBtn" onclick="exportSaved()">Export CSV</button>
        <button class="ghost-btn" id="clearSavedBtn" onclick="clearSaved()">Clear</button>
      </div>
    </div>
    <div class="saved-list" id="savedList"></div>
  </div>

  <div id="results">
    <div class="card">
      <div class="profile-row">
        <img class="avatar" id="resAvatar" src="" alt="">
        <div class="profile-info">
          <div class="name" id="resName"></div>
          <div class="handle" id="resHandle"></div>
        </div>
      </div>

      <div class="verdict" id="resVerdict"></div>

      <div class="score-row">
        <div class="score-number" id="resScore">—</div>
        <div class="score-denom">/100</div>
        <div class="score-label" id="resDomain"></div>
      </div>

      <div class="dims" id="resDims"></div>

      <hr class="divider">

      <div class="section-title">Signals</div>
      <div class="signals" id="resSignals"></div>

      <hr class="divider">

      <div class="section-title">Recruiter Summary</div>
      <div class="summary-text" id="resSummary"></div>
    </div>
  </div>

  <footer>github-screener · powered by AI</footer>
</div>

<script>
let selectedDomains = ['Backend'];
const STORAGE_KEY = 'gh-screener-saved';
const STORAGE_FILTER_KEY = 'gh-screener-saved-filter';

function selectDomain(btn) {
  const domain = btn.dataset.domain;
  if (!domain) return;
  const exists = selectedDomains.includes(domain);
  if (exists) {
    selectedDomains = selectedDomains.filter(d => d !== domain);
    btn.classList.remove('active');
  } else {
    if (selectedDomains.length >= 3) {
      setStatus('Select up to 3 specializations.', true);
      return;
    }
    selectedDomains.push(domain);
    btn.classList.add('active');
  }
  if (selectedDomains.length === 0) {
    selectedDomains = ['Backend'];
    document.querySelectorAll('.domain-btn').forEach(b => {
      if (b.dataset.domain === 'Backend') b.classList.add('active');
    });
  }
  setStatus(`Selected: ${selectedDomains.join(', ')}`);
}

function parseHandle(raw) {
  raw = raw.trim();
  const m = raw.match(/github\.com\/([a-zA-Z0-9\-]+)/);
  return m ? m[1] : raw.replace(/^@/, '');
}

function setStatus(msg, isError = false, loading = false) {
  const el = document.getElementById('status');
  el.className = 'status' + (isError ? ' error' : '');
  el.innerHTML = loading ? `<div class="spinner"></div> ${msg}` : msg;
}

function renderResults(user, r) {
  document.getElementById('resAvatar').src = user.avatar_url;
  document.getElementById('resName').textContent = user.name || user.login;
  document.getElementById('resHandle').textContent = `@${user.login}`;

  const score = r.overallScore ?? r.overall_score ?? 0;
  document.getElementById('resScore').textContent = score;
  document.getElementById('resDomain').textContent = selectedDomains.join(', ');

  const verdictEl = document.getElementById('resVerdict');
  const verdict = (r.verdict || '').toLowerCase();
  verdictEl.textContent = r.verdict || 'N/A';
  verdictEl.className = 'verdict ' + (
    verdict.includes('strong hire') || verdict.includes('hire') ? 'hire' :
    verdict.includes('maybe') ? 'maybe' : 'pass'
  );

  const dimsEl = document.getElementById('resDims');
  dimsEl.innerHTML = '';
  (r.dimensions || []).forEach(d => {
    dimsEl.innerHTML += `
      <div class="dim-row">
        <div class="dim-name">${d.name}</div>
        <div class="bar-track"><div class="bar-fill" data-val="${d.score}"></div></div>
        <div class="dim-val">${d.score}</div>
      </div>`;
  });

  const sigEl = document.getElementById('resSignals');
  sigEl.innerHTML = '';
  const normalizedSignals = (r.signals || []).length
    ? r.signals
    : (r.flags || []).map(f => ({
        color: f.type === 'positive' ? 'green' : (f.type === 'warning' ? 'yellow' : 'red'),
        label: f.text || f.label || ''
      }));

  normalizedSignals.forEach(s => {
    if (!s) return;
    const color = s.color || 'yellow';
    const label = s.label || s.text || '';
    sigEl.innerHTML += `<div class="signal ${color}"><div class="signal-dot"></div>${label}</div>`;
  });

  const sumEl = document.getElementById('resSummary');
  sumEl.innerHTML = (r.summary || '').split('\n').filter(Boolean).map(p => `<p>${p}</p>`).join('');

  const resultsEl = document.getElementById('results');
  resultsEl.classList.add('visible');

  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill').forEach(b => {
      b.style.width = b.dataset.val + '%';
    });
  });

  resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function loadSaved() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch {
    return [];
  }
}

function saveAssessment(profile, analysis, domain) {
  const saved = loadSaved();
  const entry = {
    id: `${profile.login || 'unknown'}-${Date.now()}`,
    username: profile.login || '',
    name: profile.name || '',
    domain: domain || '',
    verdict: analysis.verdict || '',
    score: analysis.overallScore ?? analysis.overall_score ?? 0,
    profile,
    analysis,
    createdAt: new Date().toISOString()
  };
  const next = [entry, ...saved].slice(0, 20);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
  renderSaved();
}

function renderSaved() {
  const list = document.getElementById('savedList');
  const saved = loadSaved();
  const query = (document.getElementById('savedSearch')?.value || '').trim().toLowerCase();
  list.innerHTML = '';
  const filtered = query
    ? saved.filter(item =>
        (item.name || '').toLowerCase().includes(query) ||
        (item.username || '').toLowerCase().includes(query) ||
        (item.domain || '').toLowerCase().includes(query) ||
        (item.verdict || '').toLowerCase().includes(query)
      )
    : saved;

  if (!filtered.length) {
    list.innerHTML = '<div class="saved-sub">No saved assessments yet.</div>';
    return;
  }
  filtered.forEach(item => {
    const row = document.createElement('div');
    row.className = 'saved-item';
    row.onclick = () => {
      selectedDomains = (item.domain || '').split(',').map(s => s.trim()).filter(Boolean);
      if (selectedDomains.length === 0) selectedDomains = ['Backend'];
      document.querySelectorAll('.domain-btn').forEach(b => {
        b.classList.toggle('active', selectedDomains.includes(b.dataset.domain));
      });
      renderResults(item.profile || {}, item.analysis || {});
    };
    row.innerHTML = `
      <div class="saved-meta">
        <div class="saved-title">${item.name || item.username || 'Unknown'}</div>
        <div class="saved-sub">@${item.username || 'n/a'} • ${item.domain || 'General'} • ${new Date(item.createdAt).toLocaleDateString()}</div>
      </div>
      <div class="saved-actions">
        <div class="saved-score">${item.score}/100</div>
        <button class="ghost-btn" data-id="${item.id}">Delete</button>
      </div>
    `;
    row.querySelector('button[data-id]')?.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteSaved(item.id);
    });
    list.appendChild(row);
  });
}

function clearSaved() {
  localStorage.removeItem(STORAGE_KEY);
  renderSaved();
}

function deleteSaved(id) {
  const saved = loadSaved().filter(item => item.id !== id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  renderSaved();
}

function exportSaved() {
  const saved = loadSaved();
  if (!saved.length) {
    setStatus('No saved assessments to export.', true);
    return;
  }
  const header = ['name','username','domain','score','verdict','createdAt'];
  const rows = saved.map(s => [
    s.name || '',
    s.username || '',
    s.domain || '',
    s.score ?? '',
    s.verdict || '',
    s.createdAt || ''
  ]);
  const csv = [header, ...rows]
    .map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
    .join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'github-screener-assessments.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setStatus('Exported saved assessments.', false);
}

async function runScreening() {
  const handleRaw = document.getElementById('handleInput').value.trim();
  if (!handleRaw) {
    setStatus('Please enter a GitHub username.', true);
    return;
  }

  const username = parseHandle(handleRaw);
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  document.getElementById('results').classList.remove('visible');

  try {
    setStatus('Assessing profile…', false, true);

    const response = await fetch('/api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, domain: selectedDomains.join(', ') })
    });

    const data = await response.json();
    if (!response.ok) {
      throw new Error(data.detail || `API error ${response.status}`);
    }

    renderResults(data.profile || {}, data.analysis || {});
    saveAssessment(data.profile || {}, data.analysis || {}, selectedDomains.join(', '));
    setStatus('Assessment complete.');
  } catch (err) {
    setStatus(err.message, true);
  } finally {
    btn.disabled = false;
  }
}

// Enter key support
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('handleInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runScreening();
  });
  setStatus(`Selected: ${selectedDomains.join(', ')}`);
  const search = document.getElementById('savedSearch');
  if (search) {
    const prev = localStorage.getItem(STORAGE_FILTER_KEY) || '';
    search.value = prev;
    search.addEventListener('input', () => {
      localStorage.setItem(STORAGE_FILTER_KEY, search.value || '');
      renderSaved();
    });
  }
  renderSaved();
});
</script>
