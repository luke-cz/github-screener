<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GitHub Screener</title>
  </head>
  <body>
    <h1>GitHub Screener</h1>
    <form id="form">
      <input id="username" placeholder="e.g. octocat" />
      <button type="submit">Assess</button>
    </form>
    <pre id="out"></pre>

    <script>
      const form = document.getElementById("form");
      const out = document.getElementById("out");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const raw = document.getElementById("username").value;
        const res = await fetch(`/api/assess?username=${encodeURIComponent(raw)}`);
        const text = await res.text();
        out.textContent = text;
      });
    </script>
  </body>
</html>
