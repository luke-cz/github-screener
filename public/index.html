<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GitHub Screener</title>
    <style>
      body { font-family: Georgia, serif; margin: 0; padding: 40px; background: #f8f5ef; color: #1d1b19; }
      .card { background: white; border: 1px solid #e6dccf; border-radius: 12px; padding: 20px; max-width: 720px; }
      input, button { font-size: 16px; padding: 10px; border-radius: 8px; border: 1px solid #e6dccf; }
      button { background: #c04f2f; color: white; border: none; cursor: pointer; }
      pre { background: #fffaf3; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>GitHub Screener</h1>
    <div class="card">
      <form id="assess-form">
        <input id="username" placeholder="e.g. octocat" />
        <button type="submit">Assess</button>
      </form>
      <pre id="output" style="display:none;"></pre>
    </div>
    <script>
      const form = document.getElementById("assess-form");
      const output = document.getElementById("output");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        if (!username) return;
        output.style.display = "block";
        output.textContent = "Assessing...";
        const res = await fetch(`/api/assess?username=${encodeURIComponent(username)}`);
        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);
      });
    </script>
  </body>
</html>
